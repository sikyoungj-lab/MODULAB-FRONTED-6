<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind.css 공부하기</title>
</head>
<body>
 <!-- row -->
<div class="flex space-x-4">
    <div class="w-30 h-30 bg-blue-400">hello</div>
    <div class="w-30 h-30 bg-blue-400">hello</div>
    <div class="w-30 h-30 bg-blue-400">hello</div>
    <div class="w-30 h-30 bg-blue-400">hello</div>
</div>
<!-- column -->
<div class="flex flex-col space-y-4 mt-4">
    <div class="w-30 h-30 bg-red-400">hello</div>
    <div class="w-30 h-30 bg-red-400">hello</div>
    <div class="w-30 h-30 bg-red-400">hello</div>
    <div class="w-30 h-30 bg-red-400">hello</div>
</div>

<div class="flex justify-center items-center w-80 h-80 border-2">
    <div class="w-40 h-40 bg-red-500"></div>
</div>
</body>
</html>
