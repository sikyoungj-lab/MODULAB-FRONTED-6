<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>HODU 로그인</title>

  <style>
    /* ===== Reset ===== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
    }

    /* ===== Layout ===== */
    .login-wrap {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 120px;
    }

    /* ===== Logo ===== */
    .logo {
      width: 238px;
      height: 74px;
      margin-bottom: 40px;
    }

    /* ===== Card ===== */
    .card {
      width: 550px;
      padding: 40px 35px 34px;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      background: #fff;
    }

    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      margin-bottom: 30px;
    }

    .tab {
      width: 275px;
      height: 80px;
      border: 1px solid #dcdcdc;
      background-color: #f5f5f5;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab.active {
      background-color: #ffffff;
      border-bottom: none;
    }

    /* ===== Inputs ===== */
    input {
      width: 100%;
      height: 60px;
      padding: 0 14px;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid #cccccc;
      margin-bottom: 18px;
      outline: none;
    }

    /* ===== Login Button ===== */
    .login-btn {
      width: 480px;
      height: 60px;
      margin: 20px auto 0;
      display: block;
      background-color: #1f8f2f;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* ===== Error Message (버튼 아래) ===== */
    .warn-text {
      margin-top: 14px;
      font-size: 14px;
      color: #d13c3c;
      white-space: nowrap;
    }

    /* ===== Links ===== */
    .links {
      margin-top: 20px;
      font-size: 14px;
    }

    .links span {
      margin: 0 8px;
      color: #aaa;
    }

    .links a {
      color: #333;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <main class="login-wrap">

    <!-- 로고 -->
    <img src="logo-hodu.png" alt="HODU 로고" class="logo" />

    <!-- 로그인 카드 -->
    <section class="card">

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab active">구매회원 로그인</button>
        <button class="tab">판매회원 로그인</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="loginForm">
        <input
          type="text"
          id="username"
          placeholder="아이디"
        />

        <input
          type="password"
          id="password"
          placeholder="비밀번호"
        />

        <button type="submit" class="login-btn">
          로그인
        </button>
      </form>

      <!-- 오류 문구 (버튼 아래) -->
      <p id="warnBox" class="warn-text"></p>

    </section>

    <!-- 하단 링크 -->
    <div class="links">
      <a href="#">회원가입</a>
      <span>|</span>
      <a href="#">비밀번호 찾기</a>
    </div>

  </main>

  <script>
    const form = document.getElementById("loginForm");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const warnBox = document.getElementById("warnBox");

    function showWarn(message) {
      warnBox.textContent = message;
    }

    function clearWarn() {
      warnBox.textContent = "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearWarn();

      const username = usernameEl.value.trim();
      const password = passwordEl.value.trim();

      if (!username) {
        showWarn("아이디를 입력해 주세요.");
        usernameEl.focus();
        return;
      }

      if (!password) {
        showWarn("비밀번호를 입력해 주세요.");
        passwordEl.focus();
        return;
      }

      try {
        const response = await fetch("/accounts/login/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, password }),
        });

        if (response.status === 401) {
          showWarn("아이디 또는 비밀번호가 일치하지 않습니다.");
          passwordEl.focus();
        }
      } catch (error) {
        showWarn("네트워크 오류가 발생했습니다.");
      }
    });
  </script>

</body>
</html>
