<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>로그인 및 회원가입</title>

  <style>
    :root{
      --accent:#8e2b2f;   /* 시안 버건디 */
      --brand:#2fbf71;    /* HODU 그린 */
      --text:#222;
      --muted:#666;
      --line:#e5e7eb;
    }

    *{ box-sizing:border-box; }

    /* ✅ 시안처럼 "종이+텍스처" 배경 느낌 */
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans KR", Segoe UI, Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;

      /* 텍스처 흉내(그라데이션+노이즈 느낌) */
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(0,0,0,.05), transparent 60%),
        radial-gradient(900px 500px at 90% 20%, rgba(0,0,0,.03), transparent 55%),
        linear-gradient(#f3f1ee, #f6f4f1);
    }

    /* ===== 전체 레이아웃 컨테이너 ===== */
    .page{
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }

    /* ===== 상단: 좌(큰타이틀) 우(안내) ===== */
    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 60px;
    }

    .leftTitle h1{
      margin:0 0 10px;
      font-size: 64px;       /* 시안처럼 큼 */
      font-weight: 900;
      color: var(--accent);
      letter-spacing:-1px;
      line-height:1.05;
    }
    .leftTitle .sub{
      margin:0;
      font-size: 22px;
      color: var(--muted);
    }

    /* ✅ 시안의 오른쪽 안내는 “왼쪽 세로라인 + 글 목록” 느낌 */
    .guide{
      max-width: 560px;
      padding-left: 18px;
      border-left: 4px solid var(--accent);
      margin-top: 12px;   /* 타이틀 대비 살짝 내려오기 */
    }
    .guide .gtitle{
      font-weight: 900;
      margin: 0 0 10px;
      font-size: 16px;
      color: #111;
    }
    .guide ul{
      margin:0;
      padding-left: 18px;
      font-size: 14px;
      line-height: 1.8;
    }
    .hl{
      color: var(--accent);
      font-weight: 900;
    }

    /* ===== 로그인 카드: 시안처럼 아래 중앙에 ===== */
    .wrap{
      margin-top: 70px;      /* 상단과 간격 크게 */
      display:flex;
      justify-content:center;
    }

    .card{
      width: 520px;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      padding: 34px 34px 28px;
      box-shadow: 0 16px 40px rgba(0,0,0,.10);
      backdrop-filter: blur(2px);
    }

    .logo{
      text-align:center;
      font-size: 50px;
      font-weight: 1000;
      color: var(--brand);
      letter-spacing: 2px;
      margin: 0 0 18px;
    }

    .tabs{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .tab{
      border: 1px solid rgba(0,0,0,.18);
      background: rgba(255,255,255,.7);
      border-radius: 10px;
      padding: 12px 12px;
      font-weight: 900;
      cursor:pointer;
    }
    .tab[aria-selected="true"]{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,191,113,.15);
    }

    label{
      display:block;
      font-weight: 900;
      margin: 12px 0 6px;
      font-size: 14px;
    }

    input{
      width:100%;
      padding: 14px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,.18);
      background: rgba(255,255,255,.75);
      font-size: 15px;
      outline:none;
    }
    input:focus{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,191,113,.15);
    }

    .warn{
      display:none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(142,43,47,.30);
      background: rgba(142,43,47,.07);
      color: var(--accent);
      font-weight: 900;
      font-size: 13px;
      line-height: 1.35;
    }
    .warn.show{ display:block; }

    .btn{
      width:100%;
      margin-top: 18px;
      padding: 14px 14px;
      border:none;
      border-radius: 10px;
      background: var(--brand);
      color:#fff;
      font-weight: 1000;
      font-size: 16px;
      cursor:pointer;
    }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }

    .links{
      display:flex;
      justify-content:center;
      gap: 14px;
      margin-top: 16px;
      font-size: 13px;
    }
    .links a{
      color:#555;
      text-decoration:none;
    }
    .links a:hover{ text-decoration:underline; }

    /* 모바일 대응 */
    @media (max-width: 860px){
      .page{ padding: 34px 18px 60px; }
      .top{ flex-direction:column; gap: 18px; }
      .leftTitle h1{ font-size: 44px; }
      .leftTitle .sub{ font-size: 18px; }
      .guide{ max-width: 100%; }
      .card{ width: 100%; }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="top">
      <div class="leftTitle">
        <h1>로그인 및 회원가입</h1>
        <p class="sub">shopping-cart-list</p>
      </div>

      <div class="gtitle">   
          <p class="gtitle"> [로그인] 버튼 클릭 오류 메시지</p>
        <ul>
          <li> </li>
          <li>아이디, 비밀 번호 입련란 모두 공란일 경우, 비밀번호만 입력했을 경우 : <span class="hl">아이디를 입력해 주세요.</span></li>
          <li>아이디만 입력했을 경우 : <span class="hl">비밀번호를 입력해 주세요.</span></li>
          <li>아이디, 비밀번호가 일치하지 않을 경우 : <span class="hl">아이디 또는 비밀번호가 일치하지가 않습니다.</span></li>
        </ul>
      </div>
    </div>

    <div class="wrap">
      <div class="card">
        <div class="logo">HODU</div>

        <div class="tabs" role="tablist" aria-label="회원 유형">
          <button id="tabBuyer" class="tab" type="button" role="tab" aria-selected="true">구매회원 로그인</button>
          <button id="tabSeller" class="tab" type="button" role="tab" aria-selected="false">판매회원 로그인</button>
        </div>

        <form id="loginForm" novalidate>
          <label for="username">아이디</label>
          <input id="username" autocomplete="username" />

          <label for="password">비밀번호</label>
          <input id="password" type="password" autocomplete="current-password" />

          <div id="warnBox" class="warn" role="alert" aria-live="polite"></div>

          <button id="loginBtn" class="btn" type="submit">로그인</button>
        </form>

        <div class="links">
          <a href="#" onclick="alert('회원가입 페이지 연결 예정')">회원가입</a>
          <a href="#" onclick="alert('비밀번호 찾기 페이지 연결 예정')">비밀번호 찾기</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    const BASE_URL = "";
    const LOGIN_API = `${BASE_URL}/accounts/login/`;
    const FALLBACK_AFTER_LOGIN = "index.html";

    const tabBuyer = document.getElementById("tabBuyer");
    const tabSeller = document.getElementById("tabSeller");
    const form = document.getElementById("loginForm");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const warnBox = document.getElementById("warnBox");
    const loginBtn = document.getElementById("loginBtn");

    let selectedUserType = "BUYER";

    function showWarn(msg){
      warnBox.textContent = msg;
      warnBox.classList.add("show");
    }
    function hideWarn(){
      warnBox.textContent = "";
      warnBox.classList.remove("show");
    }
    function setTab(type){
      selectedUserType = type;
      tabBuyer.setAttribute("aria-selected", String(type === "BUYER"));
      tabSeller.setAttribute("aria-selected", String(type === "SELLER"));
    }
    tabBuyer.addEventListener("click", () => setTab("BUYER"));
    tabSeller.addEventListener("click", () => setTab("SELLER"));

    function goBackOrHome(){
      const ref = document.referrer;
      if (ref) {
        try {
          const refUrl = new URL(ref);
          const curUrl = new URL(location.href);
          if (refUrl.origin === curUrl.origin) {
            location.href = refUrl.href;
            return;
          }
        } catch(e){}
      }
      location.href = FALLBACK_AFTER_LOGIN;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // 경고창 떠있으면 로그인 진행X
      if (warnBox.classList.contains("show")) return;
      hideWarn();

      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      if (!username) {
        showWarn("아이디를 입력해주세요.");
        usernameEl.focus();
        return;
      }
      if (!password) {
        showWarn("비밀번호를 입력해주세요.");
        passwordEl.focus();
        return;
      }

      loginBtn.disabled = true;

      try{
        const res = await fetch(LOGIN_API, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ username, password })
        });

        if (res.status === 401) {
          passwordEl.value = "";
          passwordEl.focus();
          let msg = "아이디 또는 비밀번호가 올바르지 않습니다.";
          try {
            const data = await res.json();
            if (data?.error) msg = data.error;
          } catch(_){}
          showWarn(msg);
          return;
        }

        if (!res.ok) {
          showWarn("로그인에 실패했습니다. 잠시 후 다시 시도해주세요.");
          return;
        }

        const data = await res.json();
        if (data.access) localStorage.setItem("accessToken", data.access);
        if (data.refresh) localStorage.setItem("refreshToken", data.refresh);
        if (data.user) localStorage.setItem("user", JSON.stringify(data.user));

        goBackOrHome();

      } catch(err){
        showWarn("네트워크 오류가 발생했습니다. 인터넷 연결을 확인해주세요.");
      } finally{
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
