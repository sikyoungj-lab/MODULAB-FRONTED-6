<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>로그인 및 회원가입</title>

  <style>
    :root{
      --accent:#ff0000;    /* 레드 */
      --brand:#21C063;    /* HODU 그린 */
      -text:#222;
      --muted:#666;
      --line:#e5e7eb;
    }
    *{ box-sizing:border-box; }

    /*배경(시안처럼 살짝 텍스처 느낌) */
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans KR", Segoe UI, Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(0,0,0,.06), transparent 60%),
        radial-gradient(900px 500px at 90% 20%, rgba(0,0,0,.04), transparent 55%),
        linear-gradient(#f3f1ee, #f6f4f1);
    }

    .page{
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }

    /* 상단 2컬럼 */
    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 60px;
    }

    /* ✅ 왼쪽 제목 “일자로(한 줄)” */
    .leftTitle{ flex: 0 0 520px; }   /* 왼쪽 폭 줄여서 오른쪽 확보 */
    .leftTitle h1{
  color: var(--accent);
}

.guide{
  flex: 0 0 640px;
  max-width: 640px;
  margin-top: 12px;
}

.guide .gtitle{
  font-weight: 1000;
  font-size: 18px;
  margin: 0 0 10px;
}

.guide ul{
  margin:0;
  padding-left: 20px;
  font-size: 14px;
  line-height: 1.85;
  word-break: normal;
  overflow-wrap: break-word;
}
    .hl{ color: var(--accent); font-weight: 900; }

   /* 줄바꿈 방지용 유틸 클래스 */
.nowrap{
  white-space: nowrap;
}

    /* 로그인 카드 */
    .wrap{
      margin-top: 70px;
      display:flex;
      justify-content:center;
    }
    .card{
      width: 520px;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      padding: 28px 34px 34px;
      box-shadow: 0 16px 40px rgba(0,0,0,.10);
      backdrop-filter: blur(2px);
    }

    /* ✅ 로고 이미지 */
    .logo{
      display:flex;
      justify-content:center;
      margin: 6px 0 18px;
    }
    .logo img{
      width: 260px;        /* 필요하면 220~320 사이로 조절 */
      max-width: 100%;
      height: auto;
      display:block;
    }

    .tabs{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .tab{
      border: 1px solid rgba(0,0,0,.18);
      background: rgba(255,255,255,.7);
      border-radius: 10px;
      padding: 12px 12px;
      font-weight: 900;
      cursor:pointer;
    }
    .tab[aria-selected="true"]{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,191,113,.15);
    }

    label{
      display:block;
      font-weight: 900;
      margin: 12px 0 6px;
      font-size: 14px;
    }
    input{
      width:100%;
      padding: 14px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,.18);
      background: rgba(255,255,255,.75);
      font-size: 15px;
      outline:none;
    }
    input:focus{
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,191,113,.15);
    }

    /* ✅ 실제 오류 메시지 박스(요구한 형태로 출력될 자리) */
    .warn{
      display:none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border-left: 4px solid var(--accent);
      background: rgba(142,43,47,.07);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }
    .warn strong{ font-weight: 1000; }
    .warn.show{ display:block; }

    .btn{
      width:100%;
      margin-top: 18px;
      padding: 14px 14px;
      border:none;
      border-radius: 10px;
      background: var(--brand);
      color:#fff;
      font-weight: 1000;
      font-size: 16px;
      cursor:pointer;
    }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }

    .links{
      display:flex;
      justify-content:center;
      gap: 14px;
      margin-top: 16px;
      font-size: 13px;
    }
    .links a{
      color:#555;
      text-decoration:none;
    }
    .links a:hover{ text-decoration:underline; }

    /* 모바일 */
    @media (max-width: 900px){
      .page{ padding: 34px 18px 60px; }
      .top{ flex-direction:column; gap: 18px; }
      .leftTitle{ flex: 1 1 auto; }
      .leftTitle h1{ font-size: 44px; white-space: normal; } /* 모바일에서는 자연스럽게 줄바꿈 허용 */
      .leftTitle .sub{ font-size: 18px; }
      .card{ width: 100%; }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ✅ 상단: 시안처럼 좌/우 -->
    <div class="top">
      <div class="leftTitle">
        <h1>로그인 및 회원가입</h1>
        <p class="sub">shopping-cart-list</p>
      </div>

      <div class="guide">
        <p class="gtitle">[로그인] 버튼 클릭 오류 메시지</p>
        <ul>
          <li>
            <span class="nowrap">
            아이디, 비밀번호 입력란 모두 공란일 경우 또는 비밀번호만 입력했을 경우 :
            <span class="hl">아이디를 입력해 주세요.</span>
            </span>
</li>
          <li>
            아이디만 입력했을 경우 :
            <span class="hl">비밀번호를 입력해 주세요.</span>
          </li>
          <li>
            아이디, 비밀번호가 일치하지 않을 경우 :
            <span class="hl">아이디, 비밀번호가 일치하지 않습니다.</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- ✅ 로그인 카드 -->
    <div class="wrap">
      <div class="card">
        <div class="logo">
          <!-- ✅ 로고 파일명: logo-hodu.png (같은 폴더) -->
          <img src="logo-hodu.png" alt="HODU 로고">
        </div>

        <div class="tabs" role="tablist" aria-label="회원 유형">
          <button id="tabBuyer" class="tab" type="button" role="tab" aria-selected="true">구매회원 로그인</button>
          <button id="tabSeller" class="tab" type="button" role="tab" aria-selected="false">판매회원 로그인</button>
        </div>

        <form id="loginForm" novalidate>
          <label for="username">아이디</label>
          <input id="username" autocomplete="username" />

          <label for="password">비밀번호</label>
          <input id="password" type="password" autocomplete="current-password" />

          <!-- ✅ 여기서 “ㆍ 메시지” 형태로 뜸 -->
          <div id="warnBox" class="warn" role="alert" aria-live="polite"></div>

          <button id="loginBtn" class="btn" type="submit">로그인</button>
        </form>

        <div class="links">
          <a href="#" onclick="alert('회원가입 페이지 연결 예정')">회원가입</a>
          <a href="#" onclick="alert('비밀번호 찾기 페이지 연결 예정')">비밀번호 찾기</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ====== 탭(구매/판매) UI만 처리 ======
    const tabBuyer = document.getElementById("tabBuyer");
    const tabSeller = document.getElementById("tabSeller");
    let selectedUserType = "BUYER";
    function setTab(type){
      selectedUserType = type;
      tabBuyer.setAttribute("aria-selected", String(type === "BUYER"));
      tabSeller.setAttribute("aria-selected", String(type === "SELLER"));
    }
    tabBuyer.addEventListener("click", () => setTab("BUYER"));
    tabSeller.addEventListener("click", () => setTab("SELLER"));

    // ====== 로그인 로직(요구한 문구 그대로) ======
    const form = document.getElementById("loginForm");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const warnBox = document.getElementById("warnBox");
    const loginBtn = document.getElementById("loginBtn");

    // API 주소는 필요에 따라 바꾸기
    const BASE_URL = "";
    const LOGIN_API = `${BASE_URL}/accounts/login/`;
    const FALLBACK_AFTER_LOGIN = "index.html";

    function showWarn(message) {
      warnBox.innerHTML = `<strong>[로그인] 버튼 클릭 오류 메시지</strong><br>ㆍ ${message}`;
      warnBox.classList.add("show");
    }
    function hideWarn() {
      warnBox.innerHTML = "";
      warnBox.classList.remove("show");
    }
    function goBackOrHome(){
      const ref = document.referrer;
      if (ref) {
        try {
          const refUrl = new URL(ref);
          const curUrl = new URL(location.href);
          if (refUrl.origin === curUrl.origin) {
            location.href = refUrl.href;
            return;
          }
        } catch(e){}
      }
      location.href = FALLBACK_AFTER_LOGIN;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideWarn();

      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      // 1) 공란 또는 비번만 입력 -> 아이디 입력 요청
      if (!username) {
        showWarn("아이디를 입력해 주세요.");
        usernameEl.focus();
        return;
      }

      // 2) 아이디만 입력 -> 비밀번호 입력 요청
      if (!password) {
        showWarn("비밀번호를 입력해 주세요.");
        passwordEl.focus();
        return;
      }

      loginBtn.disabled = true;

      try {
        const res = await fetch(LOGIN_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        // 3) 불일치(401)
        if (res.status === 401) {
          showWarn("아이디, 비밀번호가 일치하지 않습니다.");
          passwordEl.value = "";
          passwordEl.focus();
          return;
        }

        if (!res.ok) {
          showWarn("로그인에 실패했습니다.");
          return;
        }

        const data = await res.json();
        if (data.access) localStorage.setItem("accessToken", data.access);
        if (data.refresh) localStorage.setItem("refreshToken", data.refresh);
        if (data.user) localStorage.setItem("user", JSON.stringify(data.user));

        goBackOrHome();
      } catch (err) {
        showWarn("네트워크 오류가 발생했습니다.");
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
