<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>리액트 1분만에 추가해보기!</title>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        // JSX 라는 문법입니다! 순수 JavaScript가 아니에요!

        const header = (
            <header>
                <nav>
                    <ul>
                        <li>about</li>
                        <li>product</li>
                        <li>contact</li>
                    </ul>
                </nav>
            </header>
        );

        const main = (
            <main>
                우리회사 짱짱!
            </main>
        );

        const footer = (
            <footer>
                &copy; 2024 MyCompany
            </footer>
        );

        // 003_2번과 차이는 {}입니다.
        // 이 중괄호는 JSX 내부에서 JavaScript 표현식을 쓸 수 있게 해줍니다.
        // 이것도 역시나 나중에 배울 문법이기도 합니다.
        const app = (
            <div>
                {header}
                {main}
                {footer}
            </div>
        );

        // 위 코드는 아래 코드와 같습니다.
        // const app = (
        //     <div>
        //         <header>
        //             <nav>
        //                 <ul>
        //                     <li>about</li>
        //                     <li>product</li>
        //                     <li>contact</li>
        //                 </ul>
        //             </nav>
        //         </header>
        //         <main>
        //             우리회사 짱짱!
        //         </main>
        //         <footer>
        //             &copy; 2024 MyCompany
        //         </footer>
        //     </div>
        // )

        // DOM에 리액트 컴포넌트 랜더링하기

        const domContainer = document.querySelector('#root');
        const root = ReactDOM.createRoot(domContainer);
        root.render(app);
    </script>
</body>
</html>
